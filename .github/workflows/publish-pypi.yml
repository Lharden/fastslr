name: Publish to PyPI

# Publica o FastSLR no PyPI via Trusted Publishing (OIDC) — sem token armazenado.
#
# Configuração única (uma vez) em https://pypi.org/manage/account/publishing/ :
#   - PyPI Project Name: fastslr
#   - Owner:             Lharden
#   - Repository name:   fastslr
#   - Workflow name:     publish-pypi.yml
#   - Environment name:  pypi
# Depois, publicar um GitHub Release (ou rodar este workflow manualmente) publica no PyPI.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check artifacts
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/fastslr
    permissions:
      id-token: write  # necessário para Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
