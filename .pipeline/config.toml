[models]
claude_plan = "opus"                # Stage 1: planning (best architect)
claude_review = "sonnet"            # Stage 3: review (fast + good enough)
codex = "gpt-5.3-codex"            # Stage 2: implementation (default codex)

# Codex model options:
#   gpt-5.3-codex        — best overall reasoning + coding (default)
#   gpt-5.3-codex-spark  — ultra-fast, low latency, vibe coding
#   gpt-5.2-codex        — previous gen, stable
#   gpt-5.1-codex-max    — long-horizon agent tasks, large codebases
#   gpt-5.1-codex        — previous agent model
#   o3, o4-mini           — o-series (supports --reasoning-effort)

[thinking]
budget = 10000                      # Claude extended thinking tokens (0 = off, max 128000)
reasoning_effort = ""               # Only for o-series models: low / medium / high

[timeouts]
plan = 180
implement = 600
review = 300

[git]
auto_branch = true
auto_commit = true
branch_prefix = "pipeline"

[retry]
max_retries = 1
retry_delay = 5
doom_loop_detection = true          # Abort retry if git state unchanged

[pipeline]
compact_threshold = 30000           # Compact plan output above this token estimate
